<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mira — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #A47251;
            --bg: #F0D8A1;
            --white: #fffaf0;
            --sf-pro: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }
        body {
            font-family: var(--sf-pro);
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .auth-card {
            width: min(90%, 400px);
            background: var(--white);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(164, 114, 81, 0.2);
            text-align: center;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--primary);
            font-style: italic;
            margin-bottom: 0.5rem;
        }
        p { color: #6b5640; margin-bottom: 2rem; font-size: 0.95rem; }
        #google-btn-wrapper { display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="auth-card">
    <h1>Mira</h1>
    <p>Sign in with Google to access your journal.</p>
    
    <div id="google-btn-wrapper">
        <div id="g_id_onload"
             data-client_id="400508968454-gc40mrppbnvidrhc3in9vii1nt7gch32.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
    </div>
</div>

<script>
    function handleCredentialResponse(response) {
        // Decode the Google JWT token
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        
        // Save session data
        sessionStorage.setItem('mira_unlocked', '1');
        sessionStorage.setItem('user_name', payload.name);
        
        // Redirect to your journal file
        window.location.href = 'index.html';
    }

    // Redirect if already logged in
    if (sessionStorage.getItem('mira_unlocked') === '1') {
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
