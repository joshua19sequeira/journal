<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mira — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #A47251;
    --bg: #F0D8A1;
    --text: #3d2c1e;
    --white: #fffaf0;
    --sf-pro: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  }

  body {
    font-family: var(--sf-pro);
    background: var(--bg);
    background-image: radial-gradient(at 20% 10%, rgba(221, 158, 89, 0.15) 0px, transparent 50%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
  }

  .auth-card {
    width: min(90%, 400px);
    background: var(--white);
    padding: 3rem 2rem;
    border-radius: 24px;
    box-shadow: 0 16px 40px rgba(164, 114, 81, 0.2);
    text-align: center;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    color: var(--primary);
    font-style: italic;
    margin-bottom: 0.5rem;
  }

  p { color: #6b5640; margin-bottom: 2rem; font-size: 0.95rem; }

  input {
    width: 100%;
    padding: 0.8rem 1rem;
    margin-bottom: 1rem;
    border-radius: 12px;
    border: 1.5px solid #eee;
    background: #fdf8ed;
    font-size: 1rem;
    outline: none;
  }

  input:focus { border-color: var(--primary); }

  .btn {
    width: 100%;
    padding: 1rem;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .btn:hover { transform: translateY(-2px); opacity: 0.9; }
  
  .error { color: #c44a4a; font-size: 0.85rem; margin-top: 1rem; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="auth-card">
  <h1>Mira</h1>
  <p id="instruction">Enter your passcode to continue.</p>
  
  <input type="password" id="pass" placeholder="Passcode">
  <input type="password" id="confirm" class="hidden" placeholder="Confirm Passcode">
  
  <button class="btn" onclick="attemptLogin()">Unlock Journal</button>
  <div id="msg" class="error"></div>
</div>

<script>
  const HAS_LOGIN = localStorage.getItem('mira_login_hash');
  const instruction = document.getElementById('instruction');
  const confirmInput = document.getElementById('confirm');

  if (!HAS_LOGIN) {
    instruction.innerText = "Create a new passcode for your journal.";
    confirmInput.classList.remove('hidden');
    document.querySelector('.btn').innerText = "Set Passcode";
  }

  async function hash(str, salt) {
    const encoder = new TextEncoder();
    const data = encoder.encode(salt + ":" + str);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function attemptLogin() {
    const pass = document.getElementById('pass').value;
    const msg = document.getElementById('msg');

    if (!HAS_LOGIN) {
      const confirm = confirmInput.value;
      if (pass.length < 4) return msg.innerText = "Minimum 4 characters.";
      if (pass !== confirm) return msg.innerText = "Passcodes do not match.";
      
      const salt = Math.random().toString(36).substring(2);
      localStorage.setItem('mira_login_salt', salt);
      localStorage.setItem('mira_login_hash', await hash(pass, salt));
      proceed();
    } else {
      const salt = localStorage.getItem('mira_login_salt');
      const currentHash = await hash(pass, salt);
      if (currentHash === HAS_LOGIN) proceed();
      else msg.innerText = "Incorrect passcode.";
    }
  }

  function proceed() {
    sessionStorage.setItem('mira_unlocked', '1');
    window.location.href = 'wem.html'; // Redirect to your main file
  }
</script>
</body>
</html>
